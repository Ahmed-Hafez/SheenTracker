<p-dialog
  [modal]="true"
  [(visible)]="visible"
  (onHide)="onClosePopup()"
  (onShow)="onOpenPopup()"
  [dismissableMask]="true"
  [resizable]="false"
  [draggable]="false"
>
  <ng-template pTemplate="header"
    ><h4 class="text-center text-2xl font-semibold m-0 mx-auto">
      Delete {{ title() }}
    </h4>
  </ng-template>
  <div class="flex justify-between items-center gap-5 p-10 pt-4">
    <div class="text-2xl self-end">
      <span>{{ description() }}</span>
    </div>
  </div>

  <div class="flex justify-center mx-10 gap-5">
    <button type="submit" class="btn btn-danger" (click)="onSubmit()">
      @if (isDeleteLoading()) {
        <i class="fa-solid fa-circle-notch fa-spin" style="color: #ffffff;"></i>
      }
      <span> Yes, Delete</span> 
      </button>
    <button type="reset" class="btn btn-secondary" (click)="onClosePopup()">
        <span>No, Keep</span> 
      </button>
  </div>
</p-dialog>
