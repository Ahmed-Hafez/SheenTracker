<div class="mb-4 shadow-sm border border-gray-100 rounded-lg bg-white p-5">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      @if (user().avatarUrl && !hasImageError()) {
        <img
          [src]="user().avatarUrl"
          [alt]="user().name"
          class="w-16 h-16 rounded-full object-cover"
          (error)="hasImageError.set(true)"
        />
      } @else {
        <div
          class="w-16 h-16 rounded-full bg-[#E8821A] text-white flex items-center justify-center text-2xl font-semibold"
        >
          {{ user().initials }}
        </div>
      }
      <div class="flex flex-col">
        <h1 class="text-2xl font-semibold text-gray-900 m-0">{{ user().name }}</h1>
        <span class="text-sm text-gray-500">{{ user().email1 }}</span>
        <span class="text-sm text-gray-400">{{ user().email2 }}</span>
      </div>
    </div>
    <div class="flex flex-col items-end pt-2 pr-2">
      <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1"
        >Total Hours</span
      >
      <app-hours-badge [hours]="user().totalHours" size="lg"></app-hours-badge>
    </div>
  </div>

  <!-- Added Button Section -->
  @if (showLinkSystemToAzureButton()) {
    <div class="m-4 p-4 bg-gray-50 rounded border border-gray-200 flex items-center justify-between">
      <div class="flex items-center gap-2 text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.658 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
        </svg>
        <span class="text-sm font-medium">No Azure account linked, ready to connect to {{ foundAzureUserEmail() }}</span>
      </div>
      <button
      (click)="excecuteLinkAzureUser()"
        class="px-6 py-2 bg-white border border-gray-300 rounded text-gray-700 font-medium text-sm hover:bg-gray-50 hover:border-gray-400 transition-colors"
      >
        Connect
      </button>
    </div>
  }
</div>
