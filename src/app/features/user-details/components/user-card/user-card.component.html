<div class="mb-4 shadow-sm border border-gray-100 rounded-lg bg-white p-5">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      @if (user().avatarUrl && !hasImageError()) {
        <img
          [src]="user().avatarUrl"
          [alt]="user().name"
          class="w-16 h-16 rounded-full object-cover"
          (error)="hasImageError.set(true)"
        />
      } @else {
        <div
          class="w-16 h-16 rounded-full bg-[#E8821A] text-white flex items-center justify-center text-2xl font-semibold"
        >
          {{ user().initials }}
        </div>
      }
      <div class="flex flex-col">
        <h1 class="text-2xl font-semibold text-gray-900 m-0">{{ user().name }}</h1>
        <span class="text-sm text-gray-500">{{ user().email1 }}</span>
        <span class="text-sm text-gray-400">{{ user().email2 }}</span>
      </div>
    </div>
    <div class="flex flex-col items-end pt-2 pr-2">
      <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1"
        >Total Hours</span
      >
      <app-hours-badge [hours]="user().totalHours" size="lg"></app-hours-badge>
    </div>
  </div>
</div>
