<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
  <div class="shadow-sm border border-gray-100 rounded-lg bg-white p-5">
    <div class="flex justify-between items-start">
      <div class="flex flex-col">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1"
          >Projects</span
        >
        <span class="text-3xl font-bold text-gray-900">{{ summary().projects }}</span>
      </div>
      <div
        class="bg-orange-50 p-2 rounded-md border border-orange-100 flex items-center justify-center"
      >
        <i class="pi pi-folder text-orange-400 text-xl"></i>
      </div>
    </div>
  </div>
  <div class="shadow-sm border border-gray-100 rounded-lg bg-white p-5">
    <div class="flex justify-between items-start">
      <div class="flex flex-col">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1"
          >Work Items</span
        >
        <span class="text-3xl font-bold text-gray-900">{{ summary().workItems }}</span>
      </div>
      <div
        class="bg-orange-50 p-2 rounded-md border border-orange-100 flex items-center justify-center"
      >
        <i class="pi pi-check-square text-orange-400 text-xl"></i>
      </div>
    </div>
  </div>
  <div class="shadow-sm border border-gray-100 rounded-lg bg-white p-5">
    <div class="flex justify-between items-start">
      <div class="flex flex-col">
        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1"
          >Date Range</span
        >
        <span class="text-xl font-bold text-gray-900">{{ summary().dateRange.days }} days</span>
        <span class="text-xs text-gray-400 font-medium"
          >{{ summary().dateRange.start }} &rarr; {{ summary().dateRange.end }}</span
        >
      </div>
      <div
        class="bg-orange-50 p-2 rounded-md border border-orange-100 flex items-center justify-center"
      >
        <i class="pi pi-calendar text-orange-400 text-xl"></i>
      </div>
    </div>
  </div>
</div>
