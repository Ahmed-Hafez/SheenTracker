<div class="flex flex-col gap-6">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <app-kpi-card
      label="CLOSED TASKS"
      [value]="data()?.kpis?.closedTasks?.toString()"
      icon="pi pi-trophy text-xl"
    ></app-kpi-card>

    <app-kpi-card
      label="TOTAL CLOSED HOURS"
      [value]="data()?.kpis?.totalClosedHours"
      icon="pi pi-check-square text-xl"
    ></app-kpi-card>

    <app-kpi-card
      label="PROJECTS TOUCHED"
      [value]="data()?.kpis?.projectsTouched?.toString()"
      icon="pi pi-folder text-xl"
    ></app-kpi-card>
  </div>

  <div class="bg-white rounded-lg shadow-sm border border-gray-100 overflow-hidden">
    <p-table [value]="data()?.items || []">
      <ng-template pTemplate="header">
        <tr>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50">ID</th>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50">Title</th>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50">Type</th>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50">Project</th>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50 text-right">
            &Delta; Hours
          </th>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50 text-right">
            Final Hours
          </th>
          <th class="text-xs uppercase text-gray-500 font-semibold bg-gray-50">Closed On</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr class="hover:bg-gray-50/50">
          <td class="text-[#E8821A] font-medium text-sm">
            <a
              href="https://dev.azure.com/tilde-technology/{{ item.project }}/_workitems/edit/{{
                item.urlId
              }}/"
              target="_blank"
              rel="noopener noreferrer"
              class="hover:underline inline-flex items-center"
            >
              {{ item.id }} <i class="pi pi-external-link text-[10px] ml-1"></i>
            </a>
          </td>
          <td class="text-sm font-medium text-gray-700">{{ item.title }}</td>
          <td class="text-sm text-gray-500">{{ item.type }}</td>
          <td class="text-sm text-gray-500">{{ item.project }}</td>
          <td
            class="text-sm text-right font-medium"
            [ngClass]="item.isPositiveDelta ? 'text-teal-500' : 'text-[#E8821A]'"
          >
            {{ item.deltaHours }}
          </td>
          <td class="text-sm text-right text-gray-600 font-medium">{{ item.finalHours }}</td>
          <td class="text-sm text-gray-500">{{ item.closedOn }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
