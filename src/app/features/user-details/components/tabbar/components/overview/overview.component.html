<div class="flex flex-col gap-1">
  @if (summary()) {
    <app-user-summary [summary]="summary()"></app-user-summary>
  }

  <!-- Employee Hierarchy Card -->
  <div class="bg-white rounded-lg shadow-sm border border-[#E3E1DE] p-5 w-full">
    <h3 class="text-xs uppercase text-gray-500 font-semibold mb-4">Employee Hierarchy</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-[#FBFAF9] rounded-lg p-3 flex items-center gap-3 border border-[#E3E1DE]">
        <div class="text-[#E8821A] bg-orange-50 p-2 rounded flex items-center justify-center">
          <i class="pi pi-users"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] uppercase text-gray-500 font-semibold">Team</span>
          <span class="text-sm font-medium text-gray-800">Data Insights</span>
        </div>
      </div>

      <div class="bg-[#FBFAF9] rounded-lg p-3 flex items-center gap-3 border border-[#E3E1DE]">
        <div class="text-[#E8821A] bg-orange-50 p-2 rounded flex items-center justify-center">
          <i class="pi pi-folder"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] uppercase text-gray-500 font-semibold">Primary Project</span>
          <span class="text-sm font-medium text-gray-800">Equinox Portal</span>
        </div>
      </div>

      <div class="bg-[#FBFAF9] rounded-lg p-3 flex items-center gap-3 border border-[#E3E1DE]">
        <div class="text-[#E8821A] bg-orange-50 p-2 rounded flex items-center justify-center">
          <i class="pi pi-briefcase"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] uppercase text-gray-500 font-semibold">Department</span>
          <span class="text-sm font-medium text-gray-800">QC</span>
        </div>
      </div>

      <div class="bg-[#FBFAF9] rounded-lg p-3 flex items-center gap-3 border border-[#E3E1DE]">
        <div class="text-[#E8821A] bg-orange-50 p-2 rounded flex items-center justify-center">
          <i class="pi pi-user text-sm"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] uppercase text-gray-500 font-semibold">Job Title</span>
          <span class="text-sm font-medium text-gray-800">Quality Engineer</span>
        </div>
      </div>

      <div class="bg-[#FBFAF9] rounded-lg p-3 flex items-center gap-3 border border-[#E3E1DE]">
        <div
          class="w-8 h-8 rounded-full bg-indigo-500 text-white flex items-center justify-center text-xs font-bold"
        >
          DT
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] uppercase text-gray-500 font-semibold">Direct Manager</span>
          <span class="text-sm font-medium text-gray-800">Daniel Toma</span>
          <span class="text-xs text-gray-500">Senior Frontend Engineer</span>
        </div>
      </div>

      <div class="bg-[#FBFAF9] rounded-lg p-3 flex items-center gap-3 border border-[#E3E1DE]">
        <div
          class="w-8 h-8 rounded-full bg-teal-600 text-white flex items-center justify-center text-xs font-bold"
        >
          HH
        </div>
        <div class="flex flex-col">
          <span class="text-[10px] uppercase text-gray-500 font-semibold">Team Leader</span>
          <span class="text-sm font-medium text-gray-800">Hassan Hassan</span>
          <span class="text-xs text-gray-500">Product Owner</span>
        </div>
      </div>
    </div>
  </div>
</div>
