<p-tabs [value]="systemUser() ? 'overview' : 'work-items'" class="w-full">
  <p-tablist>
    @if (systemUser()) {
      <p-tab value="overview">Overview</p-tab>
    }
    @if (!disableAzureTabs()) {
      <p-tab value="work-items">Work Items</p-tab>
      <p-tab value="achievements">Achievements</p-tab>
    }
  </p-tablist>

  <p-tabpanels>
    @if (systemUser()) {
      <p-tabpanel value="overview">
        <app-overview [summary]="summary()" [systemUser]="systemUser()"></app-overview>
      </p-tabpanel>
    }

    @if (!disableAzureTabs()) {
      <p-tabpanel value="work-items">
        <app-work-items [workItems]="azureUser()?.workItems?.projects ?? []"></app-work-items>
      </p-tabpanel>

      <p-tabpanel value="achievements">
        <app-achievements [achievements]="azureUser()?.achievements ?? null"></app-achievements>
      </p-tabpanel>
    }
  </p-tabpanels>
</p-tabs>
