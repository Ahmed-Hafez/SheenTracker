<div class="flex flex-col">
  <!-- Title & subtitle -->
  <p-skeleton width="12rem" height="1.75rem" styleClass="mb-2"></p-skeleton>
  <p-skeleton width="18rem" height="1rem" styleClass="mb-6"></p-skeleton>

  <!-- Two horizontal charts -->
  <div class="flex flex-col mt-2 mb-6 gap-4 md:flex-row">
    <div class="card md:w-2/3">
      <p-skeleton width="100%" height="550px"></p-skeleton>
    </div>
    <div class="card md:w-1/3">
      <p-skeleton width="100%" height="550px"></p-skeleton>
    </div>
  </div>

  <!-- Table skeleton — mirrors p-table column structure -->
  <div style="
    border-radius: 8px 8px 0 0;
    border: 1px solid #ebe9e7;
    border-bottom: none;
    box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.06);
    overflow: hidden;
    min-width: 50rem;
  ">
    <!-- Header row -->
    <div style="
      display: flex;
      background: #f9f8f7;
      border-bottom: 1px solid #eceae8;
      padding: 0.5rem 1rem;
      gap: 0;
    ">
      <div style="flex: 2; padding: 0.5rem 1rem;">
        <p-skeleton width="6rem" height="0.75rem" styleClass="opacity-60"></p-skeleton>
      </div>
      <div style="flex: 1.5; padding: 0.5rem 1rem;">
        <p-skeleton width="5rem" height="0.75rem" styleClass="opacity-60"></p-skeleton>
      </div>
      <div style="flex: 1.5; padding: 0.5rem 1rem;">
        <p-skeleton width="5rem" height="0.75rem" styleClass="opacity-60"></p-skeleton>
      </div>
      <div style="flex: 2; padding: 0.5rem 1rem;">
        <p-skeleton width="7rem" height="0.75rem" styleClass="opacity-60"></p-skeleton>
      </div>
      <div style="flex: 2; padding: 0.5rem 1rem;">
        <p-skeleton width="8rem" height="0.75rem" styleClass="opacity-60"></p-skeleton>
      </div>
    </div>

    <!-- Data rows -->
    @for (row of rows; track row) {
      <div style="
        display: flex;
        border-bottom: 1px solid #e8e7e3;
        background: #ffffff;
        align-items: center;
      ">
        <div style="flex: 2; padding: 0.75rem 1rem;">
          <p-skeleton width="80%" height="0.875rem"></p-skeleton>
        </div>
        <div style="flex: 1.5; padding: 0.75rem 1rem;">
          <p-skeleton width="60%" height="0.875rem"></p-skeleton>
        </div>
        <div style="flex: 1.5; padding: 0.75rem 1rem;">
          <p-skeleton width="50%" height="0.875rem"></p-skeleton>
        </div>
        <div style="flex: 2; padding: 0.75rem 1rem;">
          <p-skeleton width="70%" height="0.875rem"></p-skeleton>
        </div>
        <div style="flex: 2; padding: 0.75rem 1rem;">
          <p-skeleton width="55%" height="0.875rem"></p-skeleton>
        </div>
      </div>
    }
  </div>
</div>
