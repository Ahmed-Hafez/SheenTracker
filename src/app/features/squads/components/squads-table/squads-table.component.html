<p-table
  [value]="squads()"
  [paginator]="true"
  [rows]="10"
  [tableStyle]="{
    'min-width': '50rem',
    'border-radius': '8px 8px 0 0',
    border: '1px solid #ebe9e7',
    'border-bottom': 'none',
    'box-shadow': '0px 4px 4px rgba(0, 0, 0, 1)',
  }"
  [rowsPerPageOptions]="[5, 10, 20]"
  [sortOrder]="-1"
>
  <ng-template #header>
    <tr class="">
      @for (col of columns; track col) {
        <th [style.width]="col.width">
          <span class="mono-small">{{ col.header }}</span>
        </th>
      }
    </tr>
  </ng-template>
  <ng-template #body let-squad let-rowIndex="rowIndex">
    <tr>
      <td pFrozenColumn>
        <div class="flex items-center gap-3">
          <span>{{ squad.name }}</span>
        </div>
      </td>
      <td>
        <div>
        <p-avatar
          [label]="getInitials(squad.productOwnerName)"
          class="mr-2 text-"
          [style]="pickRandomColor(squad.productOwnerName || '')"
          shape="circle"
        />
        {{ squad.productOwnerName }}
        </div>
      </td>
      <td>
        <div>
       <p-avatar
          [label]="getInitials(squad.scrumMasterName)"
          class="mr-2"
          [style]="pickRandomColor(squad.scrumMasterName || '')"
          shape="circle"
        />
        {{ squad.scrumMasterName }}
        </div>
      </td>
      <td>
        {{ squad.usersCount }}
      </td>
      <td style="text-align: start">
        <button
          type="button"
          class="btn btn-secondary btn-sm"
          (click)="openMenuPopup($event, squad)"
        >
          <i class="pi pi-ellipsis-h"></i>
        </button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td [attr.colspan]="columns.length + 1">
        <div class="flex md:justify-center items-center p-10">
          <p class="block mono-metric" style="font-weight: 400">
            No users match the current filters.
          </p>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>

<p-popover #op>
  <div class="flex flex-col gap-4">
    <ul class="list-none p-0 m-0 flex flex-col">
      <li
        class="px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded cursor-pointer"
        (click)="selectedSquad() ? callActions(0) : ''"
      >
        <i class="fa-solid fa-info-circle mr-2"></i> View Details
      </li>
      <li
        class="px-4 py-2 text-sm text-amber-600 hover:bg-gray-100 rounded cursor-pointer"
        (click)="selectedSquad() ? callActions(1) : ''"
      >
        <i class="fa-solid fa-edit mr-2"></i> Edit Squad
      </li>
      <li
        class="px-4 py-2 text-sm text-red-600 hover:bg-gray-100 rounded cursor-pointer"
        (click)="selectedSquad() ? callActions(2) : ''"
      >
        <i class="fa-solid fa-trash mr-2" style="color: red"></i> Delete Squad
      </li>
    </ul>
  </div>
</p-popover>

@if (squadDialogVisible()) {
  <app-squad-form-dialog
    (outputVisibleSignal)="onDialogVisibleChange($event)"
    [inputVisibleSignal]="squadDialogVisible()"
    [isEditMode]="true"
    [squadData]="selectedSquad()"
  ></app-squad-form-dialog>
}

<app-delete-popup
  [title]="selectedSquad()?.name || 'Squad'"
  [description]="'Are you sure you want to delete this squad?'"
  [action]="deleteSquad(selectedSquad()?.id || 0)"
  [inputVisibleSignal]="deleteRequestVisible()"
  (outputVisibleSignal)="closeDeletePopup($event)"
  (outputDeleteSignal)="actionTaken.emit()"
>
</app-delete-popup>
