@if (loading()) {
  <app-dashboard-skeleton />
} @else {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
    <app-kpi-card
      [label]="'Total Hours'"
      [icon]="'fa-solid fa-clock fa-sm'"
      [value]="dashboardData()?.dashboardUsers?.userKpis?.totalHours ?? 0"
    ></app-kpi-card>

    <app-kpi-card
      [label]="'Users with Hours'"
      [icon]="'fa-solid fa-user-check fa-sm'"
      [value]="dashboardData()?.dashboardUsers?.userKpis?.usersWithHours ?? 0"
    ></app-kpi-card>

    <app-kpi-card
      [label]="'Inactive Users'"
      [icon]="'fa-solid fa-user-slash fa-sm'"
      [value]="inactiveUsers()"
    ></app-kpi-card>

    <app-kpi-card
      [label]="'Total Users'"
      [icon]="'fa-solid fa-users fa-sm'"
      [value]="dashboardData()?.dashboardUsers?.userKpis?.totalUsers ?? 0"
    ></app-kpi-card>

    <app-kpi-card
      [label]="'Projects Scanned'"
      [icon]="'fa-solid fa-check-circle fa-sm'"
      [value]="dashboardData()?.projectsKpis?.length ?? 0"
    ></app-kpi-card>
  </div>

  <div class="flex flex-col md:flex-row gap-4 mt-4">
    <div
      class="card md:w-2/3"
      echarts
      [options]="topContributorsOptions()"
      style="height: 550px"
      [initOpts]="{ renderer: 'svg' }"
    ></div>
    <div
      class="card md:w-1/3"
      echarts
      [options]="projectsWorkloadOptions()"
      style="height: 550px"
      [initOpts]="{ renderer: 'svg' }"
    ></div>
  </div>
}
