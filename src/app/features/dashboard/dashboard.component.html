<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
  <app-kpi-card
    [label]="'Total Hours'"
    [icon]="'fa-solid fa-clock fa-sm'"
    [value]="dashboardData() ? dashboardData().usersKpis.totalHours : 'Loading...'"
  ></app-kpi-card>

  <app-kpi-card
    [label]="'Users with Hours'"
    [icon]="'fa-solid fa-user-check fa-sm'"
    [value]="dashboardData() ? dashboardData().usersKpis.usersWithHours : 'Loading...'"
  ></app-kpi-card>

  <app-kpi-card
    [label]="'Total Users'"
    [icon]="'fa-solid fa-users fa-sm'"
    [value]="dashboardData() ? dashboardData().usersKpis.totalUsers : 'Loading...'"
  ></app-kpi-card>

  <app-kpi-card
    [label]="'Projects Scanned'"
    [icon]="'fa-solid fa-check-circle fa-sm'"
    [value]="dashboardData() ? dashboardData().projectsKpis.projectsCount : 'Loading...'"
  ></app-kpi-card>
</div>

<div class="flex flex-col md:flex-row gap-4 mt-4">
  <div
    class="card md:w-2/3"
    echarts
    [options]="topContributorsOptions()"
    style="height: 550px"
         [initOpts]="{ renderer: 'svg' }"

  ></div>
  <div
    class="card md:w-1/3"
    echarts
    [options]="projectsWorkloadOptions()"
    style="height: 550px"
         [initOpts]="{ renderer: 'svg' }"

  ></div>
</div>
