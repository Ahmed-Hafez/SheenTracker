<div class="card">
  <div class="flex flex-col sm:items-end sm:flex-row">
    <div class="flex-1 mb-4 sm:mb-0">
      <p class="text-xs font-normal text-foreground mb-2">PRODUCT OWNER</p>
      <div class="flex flex-row items-center">
        <p-avatar
          [label]="getInitials(sqaudDetails().productOwnerName || '')"
          class="mr-2"
          [size]="'large'"
          [style]="pickRandomColor(sqaudDetails().productOwnerName || '')"
          shape="circle"
        />
        <div class="flex flex-col">
          <a
            class="text-lg font-semibold text-foreground hover:text-(--orange-500) cursor-pointer"
           (click)="navigateToUser(sqaudDetails().productOwnerId, ProductOwnerUserKey())"
          >
            {{ sqaudDetails().productOwnerName }}
          </a>
          <p class="text-sm text-gray-500">{{ ProductOwnerEmail() }}</p>
        </div>
      </div>
    </div>
    <div class="flex-1 flex-col gap-2">
      <p class="text-xs font-normal text-foreground mb-2">SCRUM MASTER</p>
      <div class="flex flex-row items-center">
        <p-avatar
          [label]="getInitials(sqaudDetails().scrumMasterName || '')"
          class="mr-2"
          [size]="'large'"
          [style]="pickRandomColor(sqaudDetails().scrumMasterName || '')"
          shape="circle"
        />
        <div class="flex flex-col">
          <a
            class="text-lg font-semibold text-foreground hover:text-(--orange-500) cursor-pointer"
            (click)="navigateToUser(sqaudDetails().scrumMasterId, ScrumMasterUserKey())"
          >
            {{ sqaudDetails().scrumMasterName }}
          </a>
          <p class="text-sm text-gray-500">{{ ScrumMasterEmail() }}</p>
        </div>
      </div>
    </div>
  </div>
  <hr class="my-4 border-[#E3E1DE]" />
  <div>
    <div>
      <p class="text-xs font-normal text-foreground mb-2">DESCRIPTION</p>
      <p class="text-md text-gray-500">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quae, veritatis.
      </p>
    </div>
  </div>
</div>
